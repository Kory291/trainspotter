services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: trainspotter
      POSTGRES_PASSWORD: trainspotter
      POSTGRES_DB: trainspotter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainspotter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

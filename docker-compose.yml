services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: trainspotter
      POSTGRES_PASSWORD: trainspotter
      POSTGRES_DB: trainspotter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainspotter"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db

  backend:
    image: trainspotter-backend
    environment:
      DATABASE_URL: "postgresql://trainspotter:trainspotter@db:5432/trainspotter"    
    ports:
      - "8080:8080"
    networks:
      - db
      - backend

  frontend:
    image: trainspotter-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: "http://backend:8080"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  db:
  backend:
